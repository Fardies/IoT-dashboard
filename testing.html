<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Lake Dashboard - Charts</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  /* ===== GLOBAL ===== */
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background:
      linear-gradient(135deg, #d4f5e9 0%, #f0fff7 100%);
    background-attachment: fixed;
  }

  h1 {
    text-align: center;
    margin-bottom: 15px;
    color: #1b5e20;
  }

  h2 {
    color: #2e7d32;
  }

  /* ===== NAVIGATION ===== */
  nav {
    text-align: center;
    margin-bottom: 25px;
  }

  nav a {
    text-decoration: none;
    margin: 0 8px;
    padding: 10px 18px;
    background: linear-gradient(135deg, #43a047, #2e7d32);
    color: white;
    border-radius: 30px;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  nav a:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.3);
  }

  /* ===== LIVE DASHBOARD ===== */
  .dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 20px;
  }

  .card {
    background: rgba(29, 177, 44, 0.9);
    backdrop-filter: blur(6px);
    padding: 18px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    border-top: 6px solid #4caf50;
  }

  .card h3 {
    margin-bottom: 6px;
    color: #2e7d32;
  }

  .card h2 {
    font-size: 2em;
    color: #1b5e20;
  }

  /* ===== CHART SECTION ===== */
  .chart-dashboard {
    display: flex;
    flex-direction: column;
    gap: 25px;
    margin-top: 40px;
  }

  .chart-card {
    background: rgba(228, 255, 228, 0.85); 
    padding: 20px;
    border-radius: 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    border-left: 8px solid #66bb6a;
  }

  .chart-card h3 {
    text-align: center;
    color: #2e7d32;
    margin-bottom: 12px;
  }

  /* ===== TABLE ===== */
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 35px;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  }

  th, td {
    padding: 12px;
    text-align: center;
  }

  th {
    background: linear-gradient(135deg, #43a047, #2e7d32);
    color: white;
    font-weight: bold;
  }

  thead tr:nth-child(2) th {
    background: #66bb6a;
    font-size: 0.9em;
  }

  tbody tr:nth-child(even) {
    background: #f1f8f4;
  }

  tbody tr:hover {
    background: #e0f2f1;
  }

  /* ===== SMALL SCREEN ===== */
  @media (max-width: 600px) {
    .card h2 {
      font-size: 1.6em;
    }
  }
</style>
</head>
<body>

<h1>IoT Campus Environmental Monitoring System - Charts</h1>
<nav><a href="index.html">Live & Table</a></nav>

<div class="chart-dashboard">
  <div class="chart-card"><h3>Water Level (Last 7 Days)</h3><canvas id="chartWater"></canvas></div>
  <div class="chart-card"><h3>Temperature (Last 7 Days)</h3><canvas id="chartTemp"></canvas></div>
  <div class="chart-card"><h3>Humidity (Last 7 Days)</h3><canvas id="chartHum"></canvas></div>
  <div class="chart-card"><h3>Pressure (Last 7 Days)</h3><canvas id="chartPres"></canvas></div>
</div>

<script>
const CHANNEL_ID = "3216748";
const READ_API_KEY = "C4DR8Y8EFOHBRSXW";
const FIELDS = {water:4,temp:1,hum:3,pres:2};
const UPDATE_INTERVAL=20000;

const chartOptions = {
  type:'line',
  data:{labels:[], datasets:[
    {label:'Value', data:[], borderColor:'blue', fill:false},
    {label:'Min', data:[], borderColor:'green', borderDash:[5,5], fill:false},
    {label:'Max', data:[], borderColor:'red', borderDash:[5,5], fill:false},
    {label:'Average', data:[], borderColor:'orange', borderDash:[2,2], fill:false},
  ]},
  options:{responsive:true, scales:{x:{title:{display:true,text:'Timestamp'}}}}
};

const chartWater = new Chart(document.getElementById('chartWater'),JSON.parse(JSON.stringify(chartOptions)));
const chartTemp  = new Chart(document.getElementById('chartTemp'),JSON.parse(JSON.stringify(chartOptions)));
const chartHum   = new Chart(document.getElementById('chartHum'),JSON.parse(JSON.stringify(chartOptions)));
const chartPres  = new Chart(document.getElementById('chartPres'),JSON.parse(JSON.stringify(chartOptions)));

async function fetchFieldData(field){
  const url=`https://api.thingspeak.com/channels/${CHANNEL_ID}/fields/${field}.json?api_key=${READ_API_KEY}&results=100`;
  const res = await fetch(url);
  const data = await res.json();
  return data.feeds.map(f=>({value:parseFloat(f[`field${field}`]), timestamp:f.created_at}));
}

async function updateCharts(){
  try{
    const waterData=await fetchFieldData(FIELDS.water);
    const tempData =await fetchFieldData(FIELDS.temp);
    const humData  =await fetchFieldData(FIELDS.hum);
    const presData =await fetchFieldData(FIELDS.pres);

    const datasets=[
      {chart:chartWater, data:waterData},
      {chart:chartTemp,  data:tempData},
      {chart:chartHum,   data:humData},
      {chart:chartPres,  data:presData},
    ];

    datasets.forEach(ds=>{
      const values = ds.data.map(d=>d.value);
      const timestamps = ds.data.map(d=>new Date(d.timestamp).toLocaleString());
      ds.chart.data.labels = timestamps;
      ds.chart.data.datasets[0].data = values;
      ds.chart.data.datasets[1].data = Array(values.length).fill(Math.min(...values));
      ds.chart.data.datasets[2].data = Array(values.length).fill(Math.max(...values));
      ds.chart.data.datasets[3].data = Array(values.length).fill(values.reduce((a,b)=>a+b,0)/values.length);
      ds.chart.update();
    });

  }catch(err){console.error(err);}
}

updateCharts();
setInterval(updateCharts,UPDATE_INTERVAL);
</script>

</body>
</html>
